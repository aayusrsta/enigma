[build]
  command    = "npm run build"
  publish    = "out"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/guffgaaf/*"
  to     = "/guffgaaf/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
